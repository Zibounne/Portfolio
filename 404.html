<!DOCTYPE html>
<html lang="en">
<head>

    <title>404 Not Found</title>
    <style>
        body {
            background-color: #F5F4E1;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            text-align: center;
            color: #333;
        }
        .gif-container {
            max-width: 80%;
            max-height: 80%;
            margin: auto;
        }
        h1 {
            font-size: 36px;

        }

        <h1>404 Not Found</h1>

        <div class="gif-container">
            <!-- Replace "your-gif.gif" with the path to your GIF -->
